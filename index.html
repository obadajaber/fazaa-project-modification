<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">

<head>
    <!-- Meta setup and page configuration (إعدادات الصفحة الأساسية) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_title">تسجيل الدخول | فزعة</title>

    <!-- External styles and assets (استيراد التنسيقات والخطوط) -->
    <link rel="icon" href="fazaalogo.webp" type="image/webp">
    <link id="bootstrapCss" rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Theme and language controls (أزرار تغيير اللغة والمظهر) -->
    <div class="position-absolute top-0 end-0 p-3 z-3 d-flex gap-2 controls-wrapper">
        <button class="btn btn-light shadow-sm rounded-circle control-btn" id="themeToggle" title="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button class="btn btn-light shadow-sm rounded-circle control-btn fw-bold font-sm" id="langToggle"
            title="Toggle Language">
            EN
        </button>
    </div>

    <!-- Background decorative shapes (خلفيات زخرفية) -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Main login container (حاوية تسجيل الدخول) -->
    <main class="d-flex align-items-center justify-content-center min-vh-100 position-relative z-1 py-4 py-md-5">
        <div class="container relative-z">
            <div class="row w-100 justify-content-center m-0">
                <div class="col-12 col-md-10 col-lg-7 col-xl-5 p-0">
                    <div class="glass-card entrance-anim">

                        <!-- Header section with logo and title (رأس الصفحة والشعار) -->
                        <header class="text-center mb-4 pb-2">
                            <img src="fazaalogo.webp" alt="فزعة" class="brand-logo-img mx-auto mb-3 pulse-anim">
                            <h1 class="h2 fw-bold platform-name text-dark mb-1" data-i18n="platform_name">فـــــزعـــــة
                            </h1>
                            <p class="text-danger fw-semibold slogan mb-2" data-i18n="slogan">فزعتك بتنقذ حياة</p>
                            <p class="text-muted small welcome-text" data-i18n="login_welcome">أهلاً بك مجدداً، يرجى
                                تسجيل الدخول للمتابعة</p>
                        </header>

                        <!-- Login form (نموذج تسجيل الدخول) -->
                        <form id="loginForm" novalidate>

                            <!-- Email input field (حقل البريد الإلكتروني) -->
                            <div class="form-floating mb-4 custom-floating">
                                <input type="email" class="form-control premium-input email-input-dir" id="emailInput"
                                    placeholder="name@example.com" required>
                                <label for="emailInput"><i class="fa-regular fa-envelope me-2"></i><span
                                        data-i18n="email_label">البريد الإلكتروني</span></label>
                                <div class="invalid-feedback ms-1 mt-1 font-sm animated-error">
                                    <i class="fa-solid fa-circle-exclamation me-1"></i> <span
                                        data-i18n="email_invalid">يرجى إدخال بريد إلكتروني صحيح</span>
                                </div>
                            </div>

                            <!-- Password input with toggle (حقل كلمة المرور مع إظهار/إخفاء) -->
                            <div class="form-floating mb-4 custom-floating position-relative">
                                <input type="password" class="form-control premium-input pe-5 email-input-dir"
                                    id="passwordInput" placeholder="Password" required>
                                <label for="passwordInput"><i class="fa-solid fa-lock me-2"></i><span
                                        data-i18n="password_label">كلمة المرور</span></label>
                                <button type="button"
                                    class="btn btn-link toggle-password text-muted text-decoration-none shadow-none"
                                    tabindex="-1">
                                    <i class="fa-regular fa-eye pt-1"></i>
                                </button>
                                <div class="invalid-feedback ms-1 mt-1 font-sm animated-error">
                                    <i class="fa-solid fa-circle-exclamation me-1"></i> <span
                                        data-i18n="password_invalid">يرجى إدخال كلمة المرور</span>
                                </div>
                            </div>

                            <!-- Remember me and forgot password (تذكرني واستعادة كلمة المرور) -->
                            <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                                <div class="form-check custom-checkbox">
                                    <input class="form-check-input cursor-pointer" type="checkbox" id="rememberMe">
                                    <label class="form-check-label text-muted small fw-medium mt-1 cursor-pointer"
                                        for="rememberMe" data-i18n="remember_me">تذكرني</label>
                                </div>
                                <a href="#" class="text-decoration-none text-primary font-sm fw-bold"
                                    data-bs-toggle="modal" data-bs-target="#forgotPasswordModal"
                                    data-i18n="forgot_password">نسيت كلمة المرور؟</a>
                            </div>

                            <!-- Submit login button (زر تسجيل الدخول) -->
                            <button type="submit"
                                class="btn btn-danger w-100 py-3 mb-4 rounded-3 fw-bold shadow-sm position-relative btn-glow"
                                id="loginBtn">
                                <span class="btn-text" data-i18n="login_btn">تسجيل الدخول</span>
                                <span
                                    class="spinner-border spinner-border-sm position-absolute top-50 start-50 translate-middle d-none text-white"
                                    role="status" aria-hidden="true" id="btnLoader"></span>
                            </button>

                            <!-- Divider for social login (فاصل تسجيل عبر المنصات) -->
                            <div class="position-relative text-center my-4 divider-container">
                                <span class="text-muted small px-3 bg-glass z-1 position-relative divider-text"
                                    data-i18n="or_continue_with">أو المتابعة عبر</span>
                            </div>

                            <!-- Social login buttons (أزرار تسجيل عبر المنصات) -->
                            <div class="d-flex flex-column gap-3 mb-4">
                                <!-- Google -->
                                <button type="button"
                                    class="btn btn-light border-0 social-btn w-100 d-flex align-items-center justify-content-center gap-3 py-2 shadow-sm rounded-3">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                                        alt="Google" width="20">
                                    <span class="fw-semibold text-dark small" data-i18n="social_google">المتابعة
                                        باستخدام Google</span>
                                </button>

                                <!-- Twitter -->
                                <button type="button"
                                    class="btn btn-light border-0 social-btn w-100 d-flex align-items-center justify-content-center gap-3 py-2 shadow-sm rounded-3">
                                    <i class="fa-brands fa-x-twitter fs-5 text-dark mt-1"></i>
                                    <span class="fw-semibold text-dark small" data-i18n="social_x">المتابعة باستخدام
                                        X</span>
                                </button>

                                <!-- Facebook -->
                                <button type="button"
                                    class="btn btn-light border-0 social-btn w-100 d-flex align-items-center justify-content-center gap-3 py-2 shadow-sm rounded-3 text-primary">
                                    <i class="fa-brands fa-facebook fs-5 mt-1"></i>
                                    <span class="fw-semibold text-dark small" data-i18n="social_facebook">المتابعة
                                        باستخدام Facebook</span>
                                </button>
                            </div>

                            <!-- Create account section (إنشاء حساب جديد) -->
                            <div class="text-center mt-2 px-3 pb-2 pt-2 create-account-box rounded-3">
                                <span class="text-muted small fw-medium" data-i18n="no_account">ما عندك حساب؟</span>
                                <a href="register.html"
                                    class="text-decoration-none text-danger fw-bold ms-1 hover-underline"
                                    data-i18n="create_account_link">إنشاء حساب جديد</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast notifications (رسائل التنبيه) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3 z-3">
        <div id="appToast" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-bold font-body" id="toastMessage"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Forgot password modal (نافذة استعادة كلمة المرور) -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" data-i18n="forgot_pass_title">استعادة كلمة المرور</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body pt-4 px-4 pb-4">
                    <p class="text-muted font-sm mb-4" data-i18n="forgot_pass_desc">
                        أدخل بريدك الإلكتروني المسجل لدينا وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.
                    </p>

                    <!-- Reset password form (نموذج إعادة التعيين) -->
                    <form id="forgotPasswordForm" novalidate>
                        <div class="form-floating custom-floating mb-4 position-relative">
                            <input type="email" class="form-control premium-input email-input-dir" id="resetEmail"
                                placeholder="name@example.com" required>
                            <label for="resetEmail"><i class="fa-regular fa-envelope me-2"></i><span
                                    data-i18n="email_label">البريد الإلكتروني</span></label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 position-relative overflow-hidden"
                            id="resetBtn">
                            <span class="btn-text fw-bold" data-i18n="send_reset_link">إرسال رابط الاستعادة</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts (ملفات الجافاسكربت) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>

</body>

</html>
